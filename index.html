/* ---------- LOGIN ---------- */
#login{

  z-index:9999;
}
#login::before{
  content:'';position:absolute;inset:0;

  background-size:cover;background-position:center;
}
.login-card{

  box-shadow:0 25px 50px -12px rgba(0,0,0,.5);

.login-card h1{color:#84cc16;font-size:28px;text-align:center;letter-spacing:4px;margin-bottom:6px;font-weight:900}
.login-card .sub{text-align:center;color:#6b7280;font-size:13px;margin-bottom:26px;font-weight:500}
.login-card label{display:block;font-size:12px;font-weight:700;color:#1f2937;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.login-card input{
  width:100%;padding:12px 14px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:15px;
  outline:none;transition:border-color .2s;font-family:inherit;
}
.login-card input:focus{border-color:#84cc16}
.login-card button{
  width:100%;margin-top:18px;padding:13px;border:0;border-radius:8px;background:#84cc16;color:#1f2937;
  font-weight:800;font-size:14px;letter-spacing:1px;cursor:pointer;transition:background .2s;text-transform:uppercase;
}
.login-card button:hover{background:#65a30d}
.login-card button:disabled{background:#9ca3af;cursor:wait}
.login-err{margin-top:12px;color:#b91c1c;font-size:13px;text-align:center;font-weight:600;display:none}
.login-err.show{display:block}

.menu-group{margin-bottom:25px;flex:1}

.menu-item{

.menu-item:hover{background:#374151;transform:translateX(5px)}
.menu-item:hover svg{stroke:#84cc16}
.logout-btn{
  background:transparent;border:1.5px solid #374151;color:#9ca3af;padding:10px;border-radius:8px;
  cursor:pointer;font-weight:600;font-size:13px;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;

.main{flex:1;background:#fff;position:relative;overflow:hidden}

.hero{position:relative;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:40px}

<!--
  ╔══════════════════════════════════════════════════════════════╗
  ║  PARA CAMBIAR LA CONTRASEÑA EN EL FUTURO:                   ║
  ║                                                              ║
  ║  1. Abre la consola del navegador (F12 → Console)            ║
  ║  2. Pega y ejecuta la función trxEncrypt que está            ║
  ║     al final de este archivo                                 ║
  ║  3. Llama: trxEncrypt("trx-settepi-garcia-ok", "TuNuevaPass")║
  ║  4. Copia el resultado y reemplaza el contenido del          ║
  ║     elemento <script id="trx-validator"> de abajo            ║
  ╚══════════════════════════════════════════════════════════════╝
-->

<!-- Validator blob — cifrado con la contraseña actual -->
<script id="trx-validator" type="text/plain">d5kLXDKLL8ahHPhPDmfKqwmt4TfVkipPK7kP9NkLyEvZg0gLyAaZLhHaAJoNROOnyokJ5O5loaXwwcjPpBSYnzk=</script>

<script>
const VALIDATOR_EXPECTED = "trx-settepi-garcia-ok";

// If already authenticated, skip login
(async function autoAuth(){
  const pwd = sessionStorage.getItem('trx_auth');
  if(!pwd) return;
  try{
    const blob = document.getElementById('trx-validator').textContent.trim();
    const txt = await trxDecrypt(blob, pwd);
    if(txt === VALIDATOR_EXPECTED){ showMenu(); }
    else{ sessionStorage.removeItem('trx_auth'); }
  }catch(e){ sessionStorage.removeItem('trx_auth'); }
})();

document.getElementById('loginForm').addEventListener('submit', async function(ev){
  ev.preventDefault();
  const pwd = document.getElementById('pwd').value;
  const btn = document.getElementById('btn');
  const err = document.getElementById('err');
  err.classList.remove('show');
  btn.disabled = true;
  btn.textContent = 'Verificando...';
  try{
    const blob = document.getElementById('trx-validator').textContent.trim();
    const txt = await trxDecrypt(blob, pwd);
    if(txt !== VALIDATOR_EXPECTED) throw new Error('mismatch');
    sessionStorage.setItem('trx_auth', pwd);
    showMenu();
  }catch(e){
    err.classList.add('show');
    document.getElementById('pwd').value = '';
    document.getElementById('pwd').focus();
  }finally{
    btn.disabled = false;
    btn.textContent = 'Entrar';
  }
});

document.getElementById('logoutBtn').addEventListener('click', function(){
  sessionStorage.removeItem('trx_auth');
  location.reload();
});

function showMenu(){
  document.getElementById('login').style.display = 'none';
  document.getElementById('menu').classList.add('show');
}

async function trxDecrypt(b64, password){
  const bin = Uint8Array.from(atob(b64), c=>c.charCodeAt(0));
  const salt = bin.slice(0,16);
  const iv = bin.slice(16,28);
  const ct = bin.slice(28);
  const km = await crypto.subtle.importKey('raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey(
    {name:'PBKDF2', salt, iterations:250000, hash:'SHA-256'},
    km, {name:'AES-GCM', length:256}, false, ['decrypt']
  );
  const pt = await crypto.subtle.decrypt({name:'AES-GCM', iv}, key, ct);
  return new TextDecoder().decode(pt);
}

// ── Función de utilidad para generar un nuevo blob cuando quieras cambiar la contraseña ──
// Uso desde la consola del navegador: trxEncrypt("trx-settepi-garcia-ok", "NuevaContrasena")
window.trxEncrypt = async function(text, password){
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const iv   = crypto.getRandomValues(new Uint8Array(12));
  const km   = await crypto.subtle.importKey('raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveKey']);
  const key  = await crypto.subtle.deriveKey(
    {name:'PBKDF2', salt, iterations:250000, hash:'SHA-256'},
    km, {name:'AES-GCM', length:256}, false, ['encrypt']
  );
  const ct   = await crypto.subtle.encrypt({name:'AES-GCM', iv}, key, new TextEncoder().encode(text));
  const combined = new Uint8Array(salt.length + iv.length + ct.byteLength);
  combined.set(salt, 0);
  combined.set(iv, 16);
  combined.set(new Uint8Array(ct), 28);
  const b64 = btoa(String.fromCharCode(...combined));
  console.log('%cNuevo blob generado — cópialo al <script id="trx-validator">:', 'color:green;font-weight:bold');
  console.log(b64);
  return b64;
};
</script>
